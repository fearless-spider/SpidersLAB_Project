    font_family = JetBrainsMono Nerd Font
    position = -160, -180
    halign = center
    valign = center
}


# ── Password Input Field — command-line style ─────────────────────────
input-field {
    monitor =
    size = 320, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = 0

    outer_color = rgb(FF0000)
    inner_color = rgb(0a0a0a)
    font_color = rgb(00FF00)
    fade_on_empty = false
    fade_timeout = 0

    # Command-line aesthetic
    placeholder_text = <i><span foreground="#555555">authenticate...</span></i>
    hide_input = false
    rounding = 0

    # Auth feedback colors
    check_color = rgb(00FFFF)
    fail_color = rgb(FF0000)
    fail_text = <i><span foreground="#FF0000">ACCESS DENIED</span></i>
    fail_timeout = 2000
    fail_transition = 300

    capslock_color = rgb(FF00FF)
    numlock_color = -1
    bothlock_color = -1

    position = 0, -180
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(FF0000)
    shadow_boost = 1.0
}


# ── Status Label — bottom ────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:0] echo "\"Mess with the best, die like the rest.\""
    color = rgb(333333)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}
