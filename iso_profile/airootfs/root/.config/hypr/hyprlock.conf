# ── General Settings ──────────────────────────────────────────────────
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}


# ── Background — pure black void ─────────────────────────────────────
background {
    monitor =
    color = rgb(000000)

    # CRT noise effect on auth failure — subtle static burst
    blur_size = 2
    blur_passes = 1
    noise = 0.02
    contrast = 1.0
    brightness = 1.0
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}


