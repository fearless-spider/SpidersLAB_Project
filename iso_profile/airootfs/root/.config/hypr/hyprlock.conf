# ── General Settings ──────────────────────────────────────────────────
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}


# ── Background — screenshot with blur + vibrancy ─────────────────────
background {
    monitor =
    path = screenshot
    blur_size = 6
    blur_passes = 4
    noise = 0.015
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.3
}


