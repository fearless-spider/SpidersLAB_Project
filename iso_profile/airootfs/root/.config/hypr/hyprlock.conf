    color = rgba(252, 25, 154, 0.8)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -160, -190
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(252, 25, 154, 0.4)
}


# ── Password Input Field — neon command-line ─────────────────────────
input-field {
    monitor =
    size = 320, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = 0

    outer_color = rgba(97, 226, 255, 0.8)
    inner_color = rgba(10, 8, 16, 0.85)
    font_color = rgba(97, 226, 255, 1.0)
    fade_on_empty = false
    fade_timeout = 0

    placeholder_text = authenticate...
    hide_input = false
    rounding = 0

    check_color = rgba(175, 109, 249, 1.0)
    fail_color = rgba(252, 25, 154, 1.0)
    fail_text = ACCESS DENIED
    fail_timeout = 2000
    fail_transition = 300

    capslock_color = rgba(252, 25, 154, 1.0)
    numlock_color = -1
    bothlock_color = -1

    position = 0, -190
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(97, 226, 255, 0.3)
    shadow_boost = 1.5
}


