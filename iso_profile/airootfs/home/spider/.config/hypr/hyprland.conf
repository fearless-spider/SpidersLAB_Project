# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 0: ENVIRONMENT                                                 ║
# ║  NVIDIA/VM env vars are set by /usr/local/bin/spider-launch            ║
# ║  which auto-detects hardware before starting Hyprland.                 ║
# ║  This keeps the config portable between VM testing and bare metal.     ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Electron/Chromium Wayland hints (safe everywhere)
env = NIXOS_OZONE_WL,1
env = MOZ_ENABLE_WAYLAND,1

cursor {
    no_hardware_cursors = true
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 1: DISPLAY — PLUG IN AND JACK UP                               ║
# ║  Auto-detect everything. We're not picky about monitors.               ║
# ╚══════════════════════════════════════════════════════════════════════════╝

monitor = , preferred, auto, 1


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 2: GENERAL — THE RULES OF THE GRID                             ║
# ║  Every pixel has a purpose. No rounded corners. No mercy.              ║
# ╚══════════════════════════════════════════════════════════════════════════╝

general {
    gaps_in = 15
    gaps_out = 20
    border_size = 10

    # Gradient border with borderangle animation
    col.active_border = rgba(af6df9cc) rgba(61E2FFcc) rgba(af6df9cc) rgba(61E2FFcc) rgba(af6df9cc) rgba(61E2FFcc) rgba(af6df9cc) rgba(61E2FFcc) rgba(af6df9cc) rgba(61E2FFcc) 45deg
    col.inactive_border = rgba(3b345520)
    # col.active_border = rgba(00000000)
    # col.inactive_border = rgba(00000000)

    layout = dwindle
    allow_tearing = false
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 3: DECORATION — WEAPONIZED AESTHETICS                          ║
# ║  We're not making it pretty. We're making it INTIMIDATING.             ║
# ║  Sharp edges, red glow, maximum blur. RTX 3060 can handle it.         ║
# ╚══════════════════════════════════════════════════════════════════════════╝

decoration {
    # Rounded corners disabled — HUD frame uses chamfered (cut) corners
    rounding = 0

    # >> DROP SHADOW — HOT PINK GLOW <<
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(fc199a44)
        color_inactive = rgba(19172433)
        offset = 0, 2
    }

    # >> BLUR ENGINE — KAWASE FROSTED GLASS <<
    # The RTX 3060 eats this alive. Frosted holographic panels.
    blur {
        enabled = true

        size = 8
        passes = 3
        xray = false
        noise = 0.015
        contrast = 1.05
        brightness = 0.90
        vibrancy = 0.3
        vibrancy_darkness = 0.4
        special = true
    }

    # Dim the unfocused. Only the active window deserves full brightness.
    dim_inactive = true
    dim_strength = 0.15

    active_opacity = 0.88
    inactive_opacity = 0.72
    fullscreen_opacity = 1.0

    # Screen shader disabled — raw output, no post-processing.
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 4: ANIMATIONS — SNAPPY & ELASTIC                               ║
# ║  Windows don't just appear. They ARRIVE. With attitude.               ║
# ║  Overshot bezier = the window overshoots its target and snaps back.   ║
# ║  Like a switchblade clicking into place. 3-4 speed. Zero lag.         ║
# ╚══════════════════════════════════════════════════════════════════════════╝

animations {
    enabled = true

    # -- BEZIER CURVES --
    # "overshot" — the money curve. Goes past 1.0 then snaps back.
    bezier = overshot, 0.05, 0.9, 0.1, 1.12

    # Smooth exit — windows don't just close, they dissolve
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    # Aggressive snap — for workspace transitions. No time to waste.
    bezier = snap, 0.15, 1.0, 0.25, 1.0

    # "hackersCurve" — aggressive overshoot snap. Zero Cool approved.
    bezier = hackersCurve, 0.05, 0.9, 0.1, 1.15

    # "crtOff" — instant collapse, like a CRT losing power.
    bezier = crtOff, 0.85, 0, 0.95, 0.05

    # "glitchBounce" — 20% overshoot bounce. The glitch aesthetic.
    bezier = glitchBounce, 0.22, 1.2, 0.36, 1.0

    # -- WINDOW OPEN/CLOSE --
    # Pops from 60% center, bounces past 100%, settles.
    animation = windows, 1, 4, overshot, slide
    animation = windowsIn, 1, 4, glitchBounce, popin 60%
    # CRT power-off: instant collapse to a point.
    animation = windowsOut, 1, 3, crtOff, popin 5%
    animation = windowsMove, 1, 3, overshot

    # -- FADE --
    animation = fade, 1, 3, smoothIn
    animation = fadeIn, 1, 3, smoothIn
    # CRT fade-out complements the collapse
    animation = fadeOut, 1, 3, crtOff

    # -- BORDER --
    # The gradient on the border rotates endlessly. ~10 second full rotation.
    animation = border, 1, 8, default
    animation = borderangle, 1, 100, default, loop

    # -- WORKSPACE SWITCH --
    # Horizontal elastic overshoot. Glitch bounce on the slide.
    animation = workspaces, 1, 4, glitchBounce, slide
    animation = specialWorkspace, 1, 4, overshot, slidefadevert
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 5: INPUT — PRECISION TARGETING                                  ║
# ║  Polish keyboard layout. Mouse follows focus. Zero sensitivity drift. ║
# ╚══════════════════════════════════════════════════════════════════════════╝

input {
    kb_layout = pl
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
        disable_while_typing = true
    }
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 6: LAYOUT ENGINE — DWINDLE TILING                              ║
# ║  Binary space partitioning. Every window gets exactly the space        ║
# ║  it deserves. No more, no less.                                        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 7: MISC — KILL THE DEFAULTS                                    ║
# ║  No logos, no splash screens. This is OUR machine.                     ║
# ╚══════════════════════════════════════════════════════════════════════════╝

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
}

debug {
    damage_tracking = 2
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 8: AUTOSTART — BOOT SEQUENCE                                   ║
# ║  The spider wakes up. Waybar loads. Wallpaper renders.                 ║
# ║  Notifications come online. The web is spun.                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# -- Status bar — the neural HUD
exec-once = waybar

# -- Wallpaper engine
exec-once = hyprpaper

# -- Notification daemon — alerts from the web
exec-once = dunst

# -- Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# -- Polkit agent (for privileged operations)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# -- Spider Intro — cinematic Hackers-style desktop boot sequence
exec-once = kitty --class spider-intro -o background_opacity=1.0 -o font_size=14 -e spider-intro

# -- Eww HUD sidebar — the spider's nervous system
exec-once = eww open hud-sidebar

# -- GLava sonar — tactical audio visualization on desktop
exec-once = glava --desktop


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 9: KEYBINDINGS — THE HACKER'S MUSCLE MEMORY                    ║
# ║  Every bind is a weapon. Learn them. Live them.                        ║
# ║  "Type cookie, you idiot." — Cereal Killer                            ║
# ╚══════════════════════════════════════════════════════════════════════════╝

$mainMod = SUPER

# ── Core Arsenal ──────────────────────────────────────────────────────────
# Super+T = Terminal. Your primary weapon.
bind = $mainMod, T, exec, kitty

# Super+Shift+T = Electrical Hazard terminal. High voltage.
bind = $mainMod SHIFT, T, exec, kitty --class=kitty-hazard --config=~/.config/kitty/kitty-hazard.conf

# Super+Q = Kill. Terminate with extreme prejudice.
bind = $mainMod, Q, killactive,

# Super+E = File manager. Recon the filesystem.
bind = $mainMod, E, exec, thunar

# Super+D = App launcher. The spider's web of programs.
bind = $mainMod, D, exec, wofi --show drun --style ~/.config/wofi/style.css

# Super+V = Float toggle. Break free from the grid.
bind = $mainMod, V, togglefloating,

# Super+F = Fullscreen. Total domination.
bind = $mainMod, F, fullscreen, 0

# Super+P = Pseudo-tile. Half in, half out.
bind = $mainMod, P, pseudo,

# Super+J = Toggle split. Rotate the dwindle.
bind = $mainMod, J, togglesplit,

# Super+L = Lock screen. Paranoia is a feature.
bind = $mainMod, L, exec, hyprlock

# Super+X = Power menu. The kill switch.
bind = $mainMod, X, exec, spider-power-menu

# Super+M = Exit Hyprland. The nuclear option.
bind = $mainMod SHIFT, M, exit,

# Super+B = Toggle waybar. Disappear the HUD.
bind = $mainMod, B, exec, pkill -SIGUSR1 waybar

# Super+Shift+H = Toggle Hazard shader. Enter the voltage.
bind = $mainMod SHIFT, H, exec, ~/.config/hypr/toggle-hazard-shader.sh

# ── Clipboard ─────────────────────────────────────────────────────────────
# Super+C = Clipboard history. Everything you've ever copied.
bind = $mainMod, C, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ── Screenshots — capture the evidence ────────────────────────────────────
# Print = Screenshot region → clipboard
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
# Super+Print = Screenshot full screen → file
bind = $mainMod, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
# Super+Shift+Print = Screenshot active window → clipboard
bind = $mainMod SHIFT, Print, exec, hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - - | wl-copy

# ── Focus navigation — move through the web ──────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Vim-style focus (for the real ones)
bind = $mainMod, H, movefocus, l
bind = $mainMod, K, movefocus, u
# bind = $mainMod, J, movefocus, d  # J is taken by togglesplit
bind = $mainMod SHIFT, L, movefocus, r

# ── Window manipulation ──────────────────────────────────────────────────
# Move windows with Super+Shift+Arrow
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize with Super+Ctrl+Arrow
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# ── Workspace switching — 9 parallel dimensions ──────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ── Teleport window to workspace ─────────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scroll through workspaces ────────────────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Special workspace (scratchpad) ───────────────────────────────────────
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ── Mouse binds — drag and resize ────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Media keys ────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 10: WINDOW RULES — BEHAVIOR INJECTION                          ║
# ║  Certain programs get special treatment. We control the vertical.      ║
# ║  We control the horizontal.                                            ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# -- Spider Intro — fullscreen, no animation, no border
windowrule {
    name = spider-intro
    match:class = ^(spider-intro)$
    fullscreen = 1
}

# -- File Manager — float
windowrule {
    name = float-thunar
    match:class = ^(thunar)$
    float = yes
}

# -- Wofi launcher — float, stayfocused
windowrule {
    name = float-wofi
    match:class = ^(wofi)$
    float = yes
}

# -- Pavucontrol — float, sized, centered
windowrule {
    name = float-pavucontrol
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = yes
    size = 800 500
    center = true
}

# -- Firefox — full opacity
windowrule {
    name = opacity-firefox
    match:class = ^(firefox)$
    opacity = 1.0 1.0
}

# -- Chromium — full opacity
windowrule {
    name = opacity-chromium
    match:class = ^(chromium)$
    opacity = 1.0 1.0
}

# -- Image viewers — float
windowrule {
    name = float-imv
    match:class = ^(imv)$
    float = yes
}

windowrule {
    name = float-feh
    match:class = ^(feh)$
    float = yes
}

# -- Polkit — float and center
windowrule {
    name = float-polkit
    match:class = ^(polkit-gnome-authentication-agent-1)$
    float = yes
    center = true
}

# -- Startup terminal — special treatment
windowrule {
    name = float-startup-terminal
    match:class = ^(startup-terminal)$
    float = yes
    size = 900 600
    center = true
    opacity = 0.85 0.85
}

# -- Cyber-Deck panels — float, no focus steal, slight transparency
windowrule {
    name = cyberdeck-btop
    match:class = ^(cyberdeck-btop)$
    float = yes
    opacity = 0.80 0.75
}

windowrule {
    name = cyberdeck-matrix
    match:class = ^(cyberdeck-matrix)$
    float = yes
    opacity = 0.75 0.70
}

windowrule {
    name = cyberdeck-netmon
    match:class = ^(cyberdeck-netmon)$
    float = yes
    opacity = 0.80 0.75
}

# -- Ghost Protocol terminal — centered, translucent, cinematic
windowrule {
    name = ghost-protocol
    match:title = ^(ghost-protocol)$
    float = yes
    size = 800 500
    center = true
    opacity = 0.90 0.90
}

# -- Electrical Hazard terminal — hazard stripe border (matches eww .hazard-stripes)
#    Multi-stop gradient at 45deg = diagonal purple/dark alternating bands
windowrule {
    name = hazard-terminal
    match:class = ^(kitty-hazard)$
    float = yes
    size = 1000 650
    center = true
    opacity = 0.92 0.85
}


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  PHASE 11: PLUGINS — AUGMENTED REALITY                                ║
# ║  Custom window decorations. The HUD frame. Cyberpunk borders.        ║
# ║  "The future is already here — it's just not evenly distributed."    ║
# ╚══════════════════════════════════════════════════════════════════════════╝

plugin {
    hypr-hud-frame {
        # -- Geometry --
        border_width = 3          # thin neon line (like reference)
        glow_radius = 12          # subtle outer glow
        notch_size = 18           # angular corner clips size
        padding = 10              # gap between window edge and border

        # -- Colors — Spider's LAB palette --
        col.active_border = 0xaf6df9cc
        col.inactive_border = 0x3b345530
        col.glow = 0xaf6df944
        col.glow_inactive = 0x3b345511

        # -- Animations --
        pulse_speed = 2.5
        pulse_intensity = 0.35

        # -- Features (HUD decorative elements from reference) --
        show_edge_decor = 1       # dots + accent lines along edges
        show_hash_marks = 1       # diagonal hash marks at corners
        show_corner_notch = 1     # angular corner clips
        enabled = 1

        # -- Exclusions --
        exclude_classes = wofi,polkit-gnome-authentication-agent-1
    }
}

# HUD Frame plugin
plugin = /home/f3ar13ss/SpidersLAB_Project/hypr-hud-frame/dist/hypr-hud-frame.so
bind = $mainMod SHIFT, F, hypr-hud-frame:toggle,

