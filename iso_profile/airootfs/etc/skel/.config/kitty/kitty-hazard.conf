# ╔══════════════════════════════════════════════════════════════════════╗
# ║  SPIDER'S LAB — ELECTRICAL HAZARD TERMINAL                        ║
# ║                                                                    ║
# ║  "⚡ DANGER: HIGH VOLTAGE ⚡"                                      ║
# ║                                                                    ║
# ║  Launch: kitty --class=kitty-hazard --config=kitty-hazard.conf     ║
# ║  Matches the Eww Electrical Hazard panel — Fluoromachine purple.   ║
# ╚══════════════════════════════════════════════════════════════════════╝

# Pull in the base Fluoromachine config
include kitty.conf


# ══════════════════════════════════════════════════════════════════════
#  HAZARD OVERRIDES — matching Eww hazard panel
#  $hazard-gold:   #AF6DF9
#  $hazard-dim:    #7B4DB0
#  $hazard-bg:     #1E1432
#  $hazard-stripe: purple on dark
# ══════════════════════════════════════════════════════════════════════

# Wider margins — space for the hazard border zone
window_margin_width 15

# Background — matches eww $hazard-bg
background           #1E1432

# Cursor — hazard purple beam
cursor               #AF6DF9
cursor_text_color    #1E1432

# Selection — purple on dark
selection_foreground  #1E1432
selection_background  #AF6DF9

# URL links — hazard purple
url_color #AF6DF9


# ══════════════════════════════════════════════════════════════════════
#  TAB BAR — Electrical Hazard header with ⚠ warning symbols
#  Custom Python tab bar: purple/dark hazard stripes.
# ══════════════════════════════════════════════════════════════════════

tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1

# Active tab: dark on hazard purple (matches eww .hazard-title)
active_tab_foreground   #1E1432
active_tab_background   #AF6DF9
active_tab_font_style   bold

# Inactive tab: dim purple on dark (matches eww $hazard-dim)
inactive_tab_foreground #7B4DB0
inactive_tab_background #1E1432
inactive_tab_font_style normal

# Bar background — hazard dark base
tab_bar_background      #1E1432


# ══════════════════════════════════════════════════════════════════════
#  HAZARD COLOR OVERRIDES
#  Purple replaces cyan as the primary accent (matching eww panel).
# ══════════════════════════════════════════════════════════════════════

# Magenta slot — promoted to hazard purple
color5  #AF6DF9
color13 #C98FFB

# Marks — hazard purple
mark1_foreground #1E1432
mark1_background #AF6DF9
mark3_foreground #1E1432
mark3_background #AF6DF9
