# ╔══════════════════════════════════════════════════════════════════════╗
# ║  SPIDER'S LAB — KITTY TERMINAL CONFIGURATION                       ║
# ║                                                                    ║
# ║  "Never send a boy to do a woman's job." — Acid Burn               ║
# ║                                                                    ║
# ║  This terminal is your window into the machine.                    ║
# ║  80% opacity. Cyan cursor. JetBrains Mono.                        ║
# ║  Everything else is noise.                                         ║
# ╚══════════════════════════════════════════════════════════════════════╝


# ══════════════════════════════════════════════════════════════════════
#  FONT — JetBrainsMono Nerd Font
#  The only font that doesn't make your eyes bleed at 2AM.
#  Ligatures on. Because => and != deserve to look good.
# ══════════════════════════════════════════════════════════════════════

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
disable_ligatures never


# ══════════════════════════════════════════════════════════════════════
#  CURSOR — Electric Cyan beam
#  A thin beam of light cutting through the darkness.
#  It blinks forever. Like a heartbeat. Like a countdown.
# ══════════════════════════════════════════════════════════════════════

cursor_shape beam
cursor_beam_thickness 1.8
cursor #00FFFF
cursor_text_color #000000
cursor_blink_interval 0.5
cursor_stop_blinking_after 0


# ══════════════════════════════════════════════════════════════════════
#  TRANSPARENCY — 80% opacity
#  See through the terminal to the wallpaper behind.
#  A reminder that there are layers to everything.
# ══════════════════════════════════════════════════════════════════════

background_opacity 0.8
dynamic_background_opacity yes
dim_opacity 0.85


# ══════════════════════════════════════════════════════════════════════
#  WINDOW — clean, no decorations, Wayland native
#  We don't need title bars. We know what's running.
# ══════════════════════════════════════════════════════════════════════

window_padding_width 8 12
placement_strategy center
hide_window_decorations yes
confirm_os_window_close 0
initial_window_width 120c
initial_window_height 36c


# ══════════════════════════════════════════════════════════════════════
#  SCROLLBACK — deep memory
#  10K lines of history. Because evidence matters.
# ══════════════════════════════════════════════════════════════════════

scrollback_lines 10000
scrollback_pager_history_size 4


# ══════════════════════════════════════════════════════════════════════
#  MOUSE & URLS — clickable links in Electric Cyan
# ══════════════════════════════════════════════════════════════════════

mouse_hide_wait 3.0
url_color #00FFFF
url_style curly
open_url_with default
detect_urls yes
show_hyperlink_targets yes


# ══════════════════════════════════════════════════════════════════════
#  BELL — silence. Real hackers don't make noise.
# ══════════════════════════════════════════════════════════════════════

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no


# ══════════════════════════════════════════════════════════════════════
#  TAB BAR — powerline style, Spider-Red active tab
#  Your tabs are your threads. Keep them organized.
# ══════════════════════════════════════════════════════════════════════

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_bar_min_tabs 2
tab_title_template " {index}: {title} "

active_tab_foreground   #000000
active_tab_background   #FF0000
active_tab_font_style   bold
inactive_tab_foreground #555555
inactive_tab_background #111111
inactive_tab_font_style normal
tab_bar_background      #000000


# ══════════════════════════════════════════════════════════════════════
#  COLOR SCHEME — Spider's LAB Cyberpunk Palette
#
#  Pure black base. Spider-Red for errors.
#  Electric Cyan for data. Neon Magenta for accents.
#  Everything else is calibrated for maximum readability
#  during 16-hour sessions.
# ══════════════════════════════════════════════════════════════════════

foreground           #D4D4D4
background           #000000
selection_foreground #000000
selection_background #00FFFF

# -- Black — the void
color0  #000000
color8  #333333

# -- Red — Spider-Red. Errors bleed.
color1  #FF0000
color9  #FF3333

# -- Green — subdued. Cyan is our success color.
color2  #00CC66
color10 #33FF99

# -- Yellow — amber warnings
color3  #FFAA00
color11 #FFCC33

# -- Blue — deep network blue
color4  #0066FF
color12 #3399FF

# -- Magenta — Neon Magenta accent
color5  #FF00FF
color13 #FF66FF

# -- Cyan — Electric Cyan. Data. Truth. Success.
color6  #00FFFF
color14 #66FFFF

# -- White — soft white. Never #FFFFFF for text.
color7  #D4D4D4
color15 #FFFFFF

# -- Extended colors for 256-color support
mark1_foreground #000000
mark1_background #FF0000
mark2_foreground #000000
mark2_background #FF00FF
mark3_foreground #000000
mark3_background #00FFFF


# ══════════════════════════════════════════════════════════════════════
#  PERFORMANCE — tuned for RTX 3060 / Wayland
#  Low repaint delay. Sync to monitor. No stuttering.
# ══════════════════════════════════════════════════════════════════════

repaint_delay 8
input_delay 2
sync_to_monitor yes


# ══════════════════════════════════════════════════════════════════════
#  WAYLAND — native. No XWayland. No compromise.
# ══════════════════════════════════════════════════════════════════════

wayland_titlebar_color system
linux_display_server wayland


# ══════════════════════════════════════════════════════════════════════
#  KEYBINDINGS — the spider's reflexes
# ══════════════════════════════════════════════════════════════════════

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font scaling — zoom in on the target
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

# Tabs — parallel sessions
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# Splits — multiple panes, one terminal
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Reload config without restart
map ctrl+shift+f5 load_config_file

# ── End of config ────────────────────────────────────────────────────
# "Hack the planet." — Zero Cool
